####	HTTP Verification & Redirection
# Keep this symlinked in sites-enabled/ alongside bubbly_https.conf.
# It handles HTTP traffic permanently so ACME renewal keeps working even
# if the certificate expires and bubbly_https.conf cannot be loaded.
server {
	listen 80;
	listen [::]:80;

	####	Core Configuration
	# [OPTION] Server Name
	server_name example.com www.example.com;

	# [OPTION] Redirect Target
	# [WARNING] The well-known passthrough (included via security-common)
	# uses ^~ and will always take priority over this redirect.
	location / {
		return 308 https://example.com$request_uri;
	}

	include directive/bubbly_logs_off.conf;
	include groups/security-common.conf;
}
