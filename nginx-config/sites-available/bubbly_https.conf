####	Config from Bubbly v3.0-beta1
# https://github.com/eustasy/Bubbly

# Replace "example.com" with your domain.
# Search for [WARNING] to find common warnings.
# Search for [OPTION] to find options.
# [DEFAULT] denotes a default option choice.

# [WARNING] HTTP is handled by bubbly_http.conf — keep it symlinked in
# sites-enabled/ alongside this file so that ACME renewal (/.well-known/)
# continues to work even when the certificate is due for renewal.



####	HTTPS Redirection Block
# Redirect https://www.example.com to https://example.com
server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;


	####	Core Configuration

	# [OPTION] Server Name
	server_name www.example.com;

	# [OPTION] Redirect Target
	location / {
		return 308 https://example.com$request_uri;
	}

	# [OPTION] Certificate Paths
	ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
	ssl_trusted_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
	include directive/bubbly_rock-hard-ssl.conf;


	include directive/bubbly_logs_off.conf;
	include groups/security-common.conf;
}



####	Main HTTPS Block
server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;


	####	Core Configuration
	# [OPTION] Server Name
	server_name example.com;

	# [OPTION] Root Path
	root /path/to/example.com;

	# [OPTION] Index Entries
	index index.php index.html index.htm;

	# [OPTION] Automatic Indexes
	autoindex off;

	# [OPTION] Certificate Paths
	ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
	ssl_trusted_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
	include directive/bubbly_rock-hard-ssl.conf;


	charset utf-8;


	####	Extensionless PHP
	include location/bubbly_extensionless-php.conf;
	location / {
		try_files $uri $uri/ @extensionless-php;
	}

	include groups/security-common.conf;
	include groups/performance-common.conf;
}
