# Generated from https://report-uri.com/home/generate

# Built up across multiple `set` directives so each policy directive stays on
# its own line, while the header value emitted to the client is a single line
# (HTTP field-values cannot contain literal newlines).
set $bubbly_csp                "default-src  'self';";
set $bubbly_csp "$bubbly_csp    form-action  'self';";
set $bubbly_csp "$bubbly_csp    manifest-src 'self';";
set $bubbly_csp "$bubbly_csp    img-src      'self'                 https://cdn.jsdelivr.net;";
set $bubbly_csp "$bubbly_csp    font-src     'self'                 https://cdn.jsdelivr.net;";
set $bubbly_csp "$bubbly_csp    style-src    'self' 'unsafe-inline' https://cdn.jsdelivr.net;";
set $bubbly_csp "$bubbly_csp    script-src   'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.google-analytics.com;";
set $bubbly_csp "$bubbly_csp    child-src    'none';";
set $bubbly_csp "$bubbly_csp    frame-src    'none';";
set $bubbly_csp "$bubbly_csp    frame-ancestors 'none';";
set $bubbly_csp "$bubbly_csp    block-all-mixed-content;";
set $bubbly_csp "$bubbly_csp    upgrade-insecure-requests;";
set $bubbly_csp "$bubbly_csp    report-uri https://%report-uri-username%.report-uri.com/r/d/csp/enforce;";

add_header Content-Security-Policy   $bubbly_csp always;
add_header X-Content-Security-Policy $bubbly_csp always;
add_header X-WebKit-CSP              $bubbly_csp always;
