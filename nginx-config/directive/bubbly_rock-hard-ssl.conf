	# Tracking Mozilla SSL Configuration Generator, Guideline v6.0:
	# https://ssl-config.mozilla.org/

	#### SSL Stapling
	# [WARNING] Requires a valid `ssl_trusted_certificate` to be already set in your site file
	ssl_stapling on;
	ssl_stapling_verify on;
	# Cloudflare DNS, Quad9 DNS, Google DNS, OpenDNS.
	# (Dyn DNS 216.146.35.35/36 was retired by Oracle and has been removed.)
	resolver 1.1.1.1 1.0.0.1 9.9.9.9 149.112.112.112 8.8.8.8 8.8.4.4 208.67.222.222 208.67.220.220 valid=300s;
	resolver_timeout 3s;


	####	Session Tickets
	ssl_session_tickets on;
	ssl_session_timeout 24h;

	# [WARNING] Session Cache must be the same size in all `server` blocks.
	ssl_session_cache shared:SSL:100m;

	# [WARNING] Session Ticket Key must have been generated.
	ssl_session_ticket_key /etc/nginx/ssl/ticket.key;

	# Use a higher keepalive timeout to reduce the need for repeated handshakes
	keepalive_timeout 300s; # up from 75 secs default


	####	Diffie-Hellman Parameters
	# Mozilla Guideline v6.0 Intermediate no longer includes any DHE cipher
	# suites (only ECDHE), so `ssl_dhparam` is no longer required. Older
	# Bubbly setups may still have `/etc/nginx/ssl/dhparam3.pem` on disk; it
	# can be left in place or deleted, but is not referenced here.


	####	ECDH Curve
	# [OPTION] Select your preferred curve list.

	# Option 1. [DEFAULT] Mozilla Guideline v6.0 — post-quantum hybrid first,
	# then classical curves as fallback. nginx picks whichever the underlying
	# OpenSSL build supports for each peer.
	# [WARNING] X25519MLKEM768 requires nginx >= 1.27.3 and OpenSSL >= 3.5
	# (or BoringSSL / AWS-LC). On older builds nginx will fail to start; use
	# Option 2 instead.
	ssl_ecdh_curve X25519MLKEM768:X25519:prime256v1:secp384r1;

	# Option 2. Classical only — drop the post-quantum hybrid for compatibility
	# with older nginx/OpenSSL builds.
	#ssl_ecdh_curve X25519:prime256v1:secp384r1;

	# Option 3. Single curve (typically sufficient on very old builds).
	#ssl_ecdh_curve secp384r1;


	####	Cipher List
	# [OPTION] Select SSL protocols and Cipher List.
	# [WARNING] Breaks some browsers on some settings, many browsers on high settings.
	# Option 1. Modern  — TLS 1.3 only. Drops everything older than ~2020 browsers.
	# Option 2. [DEFAULT] Intermediate — TLS 1.2 + 1.3. Supports the last several
	#                     versions of every modern browser, plus a long tail.

	# Mozilla SSL Configuration Generator, Guideline v6.0
	# https://ssl-config.mozilla.org/#server=nginx&config=modern&guideline=6.0
	# Modern: TLS 1.3 only. Cipher selection is delegated to OpenSSL's TLS 1.3
	# defaults (AEAD-only, forward-secret) — no `ssl_ciphers` needed.
	#ssl_protocols TLSv1.3;
	#ssl_prefer_server_ciphers off;

	# [DEFAULT] Mozilla SSL Configuration Generator, Guideline v6.0
	# https://ssl-config.mozilla.org/#server=nginx&config=intermediate&guideline=6.0
	# Intermediate: TLS 1.2 + 1.3, ECDHE-only suites (no DHE).
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
	ssl_prefer_server_ciphers off;
