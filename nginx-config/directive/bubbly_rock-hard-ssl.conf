	# Tracking Mozilla SSL Configuration Generator, Guideline v6.0:
	# https://ssl-config.mozilla.org/


	####	Cipher List
	# [OPTION] Select SSL protocols and Cipher List.
	# [WARNING] Breaks some browsers on some settings, many browsers on high settings.
	# Option 1. Modern  — TLS 1.3 only. Drops everything older than ~2020 browsers.
	# Option 2. [DEFAULT] Intermediate — TLS 1.2 + 1.3. Supports the last several
	#                     versions of every modern browser, plus a long tail.

	# Option 1. Modern: TLS 1.3 only, with no fallback to older protocols or cipher suites.
	# Supports Firefox 63, Android 10.0, Chrome 70, Edge 75,
	#          Java 11, OpenSSL 1.1.1, Opera 57, Safari 12.1
	# generated 2026-04-28, Mozilla Guideline v6.0, nginx 1.27.3, OpenSSL 3.6.1, modern config, HSTS, OCSP
	# https://ssl-config.mozilla.org/#server=nginx&version=1.27.3&config=modern&openssl=3.6.1&hsts&ocsp&guideline=6.0
    #ssl_protocols TLSv1.3;
    #ssl_ecdh_curve X25519MLKEM768:X25519:prime256v1:secp384r1;
    #ssl_prefer_server_ciphers off;

	# Option 2. [DEFAULT] Intermediate — TLS 1.2 + 1.3. Supports the last several
	#                     versions of every modern browser, plus a long tail.
	# Supports Firefox 31.3.0, Android 4.4.2, Chrome 49, Edge 15 on Windows 10,
	#          IE 11 on Windows 10, Java 8u161, OpenSSL 1.0.1l, Opera 20, Safari 9
	# generated 2026-04-28, Mozilla Guideline v6.0, nginx 1.27.3, OpenSSL 3.6.1, intermediate config, HSTS, OCSP
	# https://ssl-config.mozilla.org/#server=nginx&version=1.27.3&config=intermediate&openssl=3.6.1&hsts&ocsp&guideline=6.0
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519MLKEM768:X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;


	####	Session Tickets
	# [WARNING] Session Tickets must be enabled for TLS 1.3, and are recommended for TLS 1.2.
	ssl_session_tickets on;
	ssl_session_timeout 24h;

	# [WARNING] Session Cache must be the same size in all `server` blocks.
	ssl_session_cache shared:SSL:10m;

	# [WARNING] Session Ticket Key must have been generated.
	ssl_session_ticket_key /etc/nginx/ssl/ticket.key;

	# Use a higher keepalive timeout to reduce the need for repeated handshakes
	keepalive_timeout 300s; # up from 75 secs default


	#### SSL Stapling
	# [WARNING] Requires a valid `ssl_trusted_certificate` to be already set in your site file
	ssl_stapling on;
	ssl_stapling_verify on;
	# Cloudflare DNS, Quad9 DNS, Google DNS, OpenDNS.
	# (Dyn DNS 216.146.35.35/36 was retired by Oracle and has been removed.)
	resolver 1.1.1.1 1.0.0.1 9.9.9.9 149.112.112.112 8.8.8.8 8.8.4.4 208.67.222.222 208.67.220.220 valid=300s;
	resolver_timeout 3s;