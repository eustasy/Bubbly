####	Cross-Origin Embedder Policy
# Controls whether the page can load cross-origin resources that don't grant
# explicit permission via CORS or CORP.
# [OPTION] Pick a COEP policy below.

# Option 1. require-corp — all resources must opt in via CORS or CORP.
# Required for Cross-Origin Isolation (SharedArrayBuffer, high-res timers).
# [WARNING] Will break any third-party resource that does not send CORP.
#add_header Cross-Origin-Embedder-Policy "require-corp" always;

# Option 2. credentialless — cross-origin resources load without cookies or
# credentials. A middle ground before full require-corp.
#add_header Cross-Origin-Embedder-Policy "credentialless" always;

# Option 3. [DEFAULT] unsafe-none — no restrictions. Safe default for sites
# that load third-party resources (CDNs, embeds) without CORP headers.
add_header Cross-Origin-Embedder-Policy "unsafe-none" always;


####	Cross-Origin Opener Policy
# Controls whether this page shares a browsing context group with cross-origin
# pages opened in popups or that opened this page.
# [OPTION] Pick a COOP policy below.

# Option 1. [DEFAULT] same-origin — full isolation. Cross-origin pages cannot
# access this window and vice versa.
add_header Cross-Origin-Opener-Policy "same-origin" always;

# Option 2. same-origin-allow-popups — isolates from cross-origin openers but
# allows same-origin popups. Useful for OAuth flows.
#add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

# Option 3. unsafe-none — no isolation. Default browser behaviour.
#add_header Cross-Origin-Opener-Policy "unsafe-none" always;


####	Cross-Origin Resource Policy
# Controls which origins are permitted to load this resource.
# [OPTION] Pick a CORP policy below.

# Option 1. [DEFAULT] same-origin — only this origin may load this resource.
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Option 2. same-site — any page on the same site may load this resource.
#add_header Cross-Origin-Resource-Policy "same-site" always;

# Option 3. cross-origin — any origin may load this resource.
# [WARNING] Only use for intentionally public assets (e.g. a public CDN).
#add_header Cross-Origin-Resource-Policy "cross-origin" always;


####	Access Control Allow Origin
# CORS: Cross-Origin Resource Sharing

# [OPTION] Pick a CORS policy below.

# Option 1. [DEFAULT] Same-origin only.
# Browsers enforce same-origin by default when no `Access-Control-Allow-Origin`
# header is sent, so the correct way to express "origin only" is to send
# nothing. (The previous `"origin"` literal was not a valid CORS value.)
# [WARNING] Will stop external sites loading your assets.

# Option 2. "*" Allow any site to load resources from your origin.
#add_header Access-Control-Allow-Origin "*" always;


####	Content Security Policy
# There is website that helps you generate a policy here http://cspisawesome.com/

# [OPTION] Pick a Content Security Policy below.

# Option 1. [DEFAULT] Off

# Option 2. Report only with a few sensible defaults.
# [OPTION] Configure reporting URL for report-uri.io
#add_header Content-Security-Policy-Report-Only "default-src 'self'; report-uri https://%report-uri-username%.report-uri.com/r/d/csp/reportOnly" always;

# Option 3. Report and enforce.
# [WARNING] This is off by default for good reason. This will break lots of things if you get it wrong.
# [OPTION] Configure reporting URL for report-uri.io
#include directive/bubbly_security-headers_csp.conf;


####	Content Type Options
# Stop content loading as a different MIME Type.
# [DEFAULT] NOSNIFF
add_header X-Content-Type-Options NOSNIFF always;


####	Frame Options
# [OPTION] Stop pages being displayed in iFrames.
# Option 1. [DEFAULT] DENY
# [WARNING] X-Frame-Options DENY will break iframed sites.
# Option 2. SAMEORIGIN
# Option 3. ALLOW-FROM $var
add_header X-Frame-Options DENY always;


####	Permissions Policy
# Restricts which browser features the page and any embedded content can use.
# Permissions-Policy is the current standard; Feature-Policy is its deprecated
# predecessor. Both are sent for compatibility with older browsers.
# [DEFAULT] Allow nothing.

set $bubbly_pp                "accelerometer=()";
set $bubbly_pp "$bubbly_pp,  ambient-light-sensor=()";
set $bubbly_pp "$bubbly_pp,  autoplay=()";
set $bubbly_pp "$bubbly_pp,  battery=()";
set $bubbly_pp "$bubbly_pp,  camera=()";
set $bubbly_pp "$bubbly_pp,  display-capture=()";
set $bubbly_pp "$bubbly_pp,  encrypted-media=()";
set $bubbly_pp "$bubbly_pp,  fullscreen=()";
set $bubbly_pp "$bubbly_pp,  geolocation=()";
set $bubbly_pp "$bubbly_pp,  gyroscope=()";
set $bubbly_pp "$bubbly_pp,  keyboard-map=()";
set $bubbly_pp "$bubbly_pp,  magnetometer=()";
set $bubbly_pp "$bubbly_pp,  microphone=()";
set $bubbly_pp "$bubbly_pp,  midi=()";
set $bubbly_pp "$bubbly_pp,  payment=()";
set $bubbly_pp "$bubbly_pp,  picture-in-picture=()";
set $bubbly_pp "$bubbly_pp,  publickey-credentials-get=()";
set $bubbly_pp "$bubbly_pp,  screen-wake-lock=()";
set $bubbly_pp "$bubbly_pp,  usb=()";
set $bubbly_pp "$bubbly_pp,  web-share=()";
set $bubbly_pp "$bubbly_pp,  xr-spatial-tracking=()";
add_header Permissions-Policy $bubbly_pp always;

set $bubbly_fp                "accelerometer 'none'";
set $bubbly_fp "$bubbly_fp;  ambient-light-sensor 'none'";
set $bubbly_fp "$bubbly_fp;  autoplay 'none'";
set $bubbly_fp "$bubbly_fp;  battery 'none'";
set $bubbly_fp "$bubbly_fp;  camera 'none'";
set $bubbly_fp "$bubbly_fp;  display-capture 'none'";
set $bubbly_fp "$bubbly_fp;  encrypted-media 'none'";
set $bubbly_fp "$bubbly_fp;  fullscreen 'none'";
set $bubbly_fp "$bubbly_fp;  geolocation 'none'";
set $bubbly_fp "$bubbly_fp;  gyroscope 'none'";
set $bubbly_fp "$bubbly_fp;  keyboard-map 'none'";
set $bubbly_fp "$bubbly_fp;  magnetometer 'none'";
set $bubbly_fp "$bubbly_fp;  microphone 'none'";
set $bubbly_fp "$bubbly_fp;  midi 'none'";
set $bubbly_fp "$bubbly_fp;  payment 'none'";
set $bubbly_fp "$bubbly_fp;  picture-in-picture 'none'";
set $bubbly_fp "$bubbly_fp;  publickey-credentials-get 'none'";
set $bubbly_fp "$bubbly_fp;  screen-wake-lock 'none'";
set $bubbly_fp "$bubbly_fp;  usb 'none'";
set $bubbly_fp "$bubbly_fp;  web-share 'none'";
set $bubbly_fp "$bubbly_fp;  xr-spatial-tracking 'none'";
add_header Feature-Policy $bubbly_fp always;


####	Referrer Policy
# Stops specific referrer information being sent to outside domains.
# [OPTION] There are a lot of options for this, we suggest reading this:
# https://scotthelme.co.uk/a-new-security-header-referrer-policy/
add_header Referrer-Policy "strict-origin-when-cross-origin" always;


####	Server Version
# [OPTION] Turn off sending the Nginx version in the server header.
server_tokens off;


####	Strict Transport Security
# [WARNING] Strict-Transport-Security will stop HTTP access for specified time.
# [OPTION] Include sub-domains with HSTS.
# Mozilla Guideline v6.0 default max-age is 63072000 (two years).

# Option 1. [DEFAULT] Current domain only.
add_header Strict-Transport-Security "max-age=63072000" always;

# Option 2. includeSubDomains
# [WARNING] This will block HTTP access to sub-domains.
#add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;


####	XSS Protection
# The XSS Auditor this header controlled was removed from all major browsers
# (Chromium-based ~2019, Safari 16+) because it was itself exploitable.
# Modern recommendation is to send `0` to explicitly disable it on the few
# remaining engines that still honour it.
# [DEFAULT] 0
add_header X-XSS-Protection 0 always;
