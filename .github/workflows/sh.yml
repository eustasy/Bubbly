# eustasy/.Normal 4.0beta8
name: Normal (Shell)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["**.sh"]
  pull_request:
    branches: [main]
    paths: ["**.sh"]

permissions:
  contents: read

jobs:
  sh:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1

      - name: Lint (shellcheck)
        run: qlty check --all --no-formatters --filter=shellcheck

      - name: Format check (shfmt)
        run: qlty check --all --filter=shfmt
