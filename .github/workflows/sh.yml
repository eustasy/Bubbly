# eustasy/.Normal 4.0beta8
name: Normal (Shell)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["**.sh"]
  pull_request:
    branches: [main]
    paths: ["**.sh"]

permissions:
  contents: read

jobs:
  sh:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0

      - name: Lint (shellcheck)
        run: qlty check --all --no-formatters --filter=shellcheck

      - name: Format check (shfmt)
        run: qlty check --all --filter=shfmt
