# eustasy/.Normal 4.0beta8
name: Normal (JSON)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["**.json"]
  pull_request:
    branches: [main]
    paths: ["**.json"]

permissions:
  contents: read

jobs:
  json:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1

      - name: Format check (prettier)
        run: git ls-files -- '*.json' | xargs -r qlty check --filter=prettier
