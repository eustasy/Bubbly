# eustasy/.Normal 4.0beta1
name: Env

on:
  push:
    branches: [main]
    paths: [".env*"]
  pull_request:
    branches: [main]
    paths: [".env*"]

permissions:
  contents: read

jobs:
  env:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: qltysh/qlty-action/install@v2

      - name: Lint (dotenv-linter)
        run: qlty check --all --filter=dotenv-linter
