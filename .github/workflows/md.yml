# eustasy/.Normal 4.0beta8
name: Normal (Markdown)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["**.md"]
  pull_request:
    branches: [main]
    paths: ["**.md"]

permissions:
  contents: read

jobs:
  md:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: qltysh/qlty-action/install@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1

      - name: Lint + format check (markdownlint)
        run: qlty check --all --filter=markdownlint
