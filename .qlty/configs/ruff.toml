line-length = 140
target-version = "py311"

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
  "S",   # flake8-bandit (security)
  "SIM", # flake8-simplify
]
ignore = [
  "S101", # assert statements (fine in tests)
]

[lint.isort]
known-first-party = []

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
